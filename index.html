<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Skincare"/>
  <meta name="theme-color" content="#3C3C3C"/>
  <title>Skincare Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --charcoal:#3C3C3C;--warm-gray:#6B6560;--taupe:#8C7B75;
      --stone:#E8E4E0;--linen:#F2EDE8;--cream:#FAF8F5;
      --white:#FFFFFF;--text-dark:#2C2C2C;--text-med:#5A5550;
      --text-light:#8C8580;--border:#DDD8D2;
      --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--text-dark);overflow:hidden}
    #app{height:100%;display:flex;flex-direction:column}

    /* HEADER */
    .header{background:var(--charcoal);flex-shrink:0;padding:calc(var(--safe-top) + 16px) 20px 16px}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .header-eyebrow{font-size:10px;color:var(--taupe);letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px}
    .header-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--cream);letter-spacing:.03em}
    .header-actions{display:flex;gap:8px;align-items:center}
    .icon-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:var(--cream);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .icon-btn:active{background:rgba(255,255,255,.25)}
    .icon-btn.add-icon{font-size:20px}

    /* NAV — draggable */
    .nav{display:flex;gap:2px}
    .nav-btn{flex:1;background:none;border:none;cursor:grab;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;color:rgba(250,248,245,.4);letter-spacing:.08em;text-transform:uppercase;padding:9px 4px;border-radius:3px;transition:color .2s,background .2s;touch-action:none;user-select:none}
    .nav-btn.active{color:var(--cream);background:rgba(255,255,255,.12)}
    .nav-btn.drag-over{background:rgba(255,255,255,.2)}
    .nav-btn.dragging{opacity:.4}

    .scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 24px)}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
    .stat{background:var(--white);padding:14px 16px}
    .stat-dot{width:5px;height:5px;border-radius:50%;margin-bottom:6px}
    .stat-val{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--charcoal);line-height:1}
    .stat-lbl{font-size:9px;color:var(--text-light);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}

    /* SEARCH */
    .search-bar{padding:12px 16px;background:var(--linen);border-bottom:1px solid var(--border);position:relative}
    .search-bar svg{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text-light);pointer-events:none}
    .search-input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-dark);border-radius:6px;outline:none;-webkit-appearance:none}
    .search-input:focus{border-color:var(--taupe)}
    .cat-scroll{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;background:var(--linen);border-bottom:1px solid var(--border);scrollbar-width:none}
    .cat-scroll::-webkit-scrollbar{display:none}
    .pill{flex-shrink:0;padding:6px 12px;border:1px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-med);border-radius:20px;cursor:pointer;white-space:nowrap}
    .pill.active{background:var(--charcoal);border-color:var(--charcoal);color:var(--cream)}

    /* DRAG HINT */
    .drag-hint{font-size:10px;color:var(--text-light);letter-spacing:.06em;text-align:center;padding:8px 0 2px;text-transform:uppercase}

    /* DRAGGABLE LISTS */
    .draggable-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
    .drag-item{touch-action:pan-y;user-select:none;position:relative}
    .drag-item.is-dragging{opacity:.3}

    /* DRAG HANDLE */
    .drag-handle{width:28px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:3px;cursor:grab;flex-shrink:0;padding:0 4px;opacity:.3;touch-action:none}
    .drag-handle span{display:block;width:16px;height:2px;background:var(--text-dark);border-radius:2px}

    /* CARDS */
    .product-card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:14px 16px;display:flex;gap:0;align-items:stretch}
    .card-content{flex:1;min-width:0}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .card-name{font-size:14px;font-weight:500;color:var(--text-dark);line-height:1.3;flex:1;margin-right:10px}
    .card-brand{font-size:11px;color:var(--text-light);margin-top:2px}
    .card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .meta-chip{font-size:11px;color:var(--text-med);background:var(--linen);padding:3px 8px;border-radius:4px}
    .badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500}
    .card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--stone)}
    .card-price{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--charcoal)}
    .card-actions{display:flex;gap:6px}
    .action-btn{padding:5px 12px;border:1px solid var(--border);background:none;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-med);border-radius:4px;cursor:pointer}
    .action-btn:active{background:var(--linen)}
    .action-btn.del:active{border-color:#8B3A3A;color:#8B3A3A}
    .days-ok{color:var(--text-med);font-size:12px;font-weight:500}
    .days-warn{color:#8B6914;font-size:12px;font-weight:500}
    .days-exp{color:#8B3A3A;font-size:12px;font-weight:500}
    .empty{padding:60px 20px;text-align:center;color:var(--text-light);font-size:14px}

    /* PAGE HEADER */
    .page-header{padding:20px 16px 8px;display:flex;justify-content:space-between;align-items:flex-end}
    .page-eyebrow{font-size:10px;color:var(--text-light);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--charcoal)}

    /* SHOPPING */
    .shop-sections{padding:8px 16px 4px}
    /* Category section */
    .shop-section{margin-bottom:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .shop-section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--linen);cursor:pointer;user-select:none;gap:8px}
    .shop-section-left{display:flex;align-items:center;gap:10px}
    .shop-section-name{font-size:11px;font-weight:500;color:var(--text-med);letter-spacing:.09em;text-transform:uppercase}
    .shop-section-count{font-size:10px;color:var(--text-light);background:var(--stone);padding:2px 7px;border-radius:10px}
    .shop-section-right{display:flex;align-items:center;gap:8px}
    .shop-section-subtotal{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--taupe)}
    .shop-chevron{font-size:11px;color:var(--text-light);transition:transform .2s;display:inline-block}
    .shop-section.collapsed .shop-chevron{transform:rotate(-90deg)}
    .shop-section-body{display:flex;flex-direction:column;gap:0}
    .shop-section.collapsed .shop-section-body{display:none}
    /* Cards inside sections */
    .shop-card{background:var(--white);border-top:1px solid var(--border);padding:12px 14px;display:flex;align-items:stretch;gap:0}
    .shop-card:first-child{border-top:none}
    .shop-card-inner{flex:1;min-width:0}
    .shop-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
    .shop-name{font-size:13px;font-weight:500;color:var(--text-dark);line-height:1.3}
    .shop-brand{font-size:11px;color:var(--text-light);margin-top:1px}
    .shop-price{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--charcoal);flex-shrink:0;margin-left:10px}
    .shop-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .shop-where{font-size:11px;color:var(--text-med)}
    .shop-note{font-size:11px;color:var(--text-light);font-style:italic;margin-top:5px}
    .shop-bottom{display:flex;justify-content:flex-end;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--stone)}
    /* Priority indicator stripe */
    .pri-stripe{width:4px;flex-shrink:0;border-radius:0;margin:-12px 10px -12px -14px;align-self:stretch}
    .shop-total{margin:4px 16px 16px;background:var(--linen);border:1px solid var(--border);border-radius:6px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
    .shop-total-lbl{font-size:11px;color:var(--text-med);letter-spacing:.06em;text-transform:uppercase}
    .shop-total-val{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--charcoal)}
    /* drag hint inside section */
    .section-drag-hint{font-size:9px;color:var(--text-light);letter-spacing:.06em;text-align:right;padding:4px 14px 2px;text-transform:uppercase;background:var(--white);border-top:1px solid var(--stone)}

    /* ROUTINE */
    .routine-card{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;align-items:stretch}
    .routine-drag-col{display:flex;align-items:center;background:var(--linen);padding:0 6px;border-right:1px solid var(--border)}
    .routine-body{flex:1;min-width:0}
    .routine-card-header{background:var(--linen);padding:8px 14px;display:flex;align-items:center;gap:10px}
    .routine-step-num{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--stone);min-width:28px}
    .routine-step-name{font-size:11px;font-weight:500;color:var(--text-med);letter-spacing:.08em;text-transform:uppercase;flex:1}
    .routine-slots{display:grid;grid-template-columns:1fr 1fr}
    .routine-slot{padding:10px 14px;border-top:1px solid var(--stone)}
    .routine-slot:first-child{border-right:1px solid var(--stone)}
    .routine-slot-lbl{font-size:9px;color:var(--text-light);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
    .routine-slot-val{font-size:12px;color:var(--text-dark);line-height:1.4}
    .weekly-section{padding:0 16px 8px}
    .weekly-card{background:var(--white);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;display:flex;align-items:stretch}
    .weekly-drag-col{display:flex;align-items:center;background:var(--linen);padding:0 6px;border-right:1px solid var(--border);border-radius:6px 0 0 6px}
    .weekly-inner{flex:1;padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .weekly-freq{font-size:10px;color:var(--text-light);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
    .weekly-name{font-size:13px;font-weight:500;color:var(--text-dark);margin-bottom:3px}
    .weekly-note{font-size:11px;color:var(--text-light);font-style:italic}
    .small-actions{display:flex;gap:5px;flex-shrink:0}
    .sm-btn{padding:4px 9px;border:1px solid var(--border);background:none;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--text-med);border-radius:4px;cursor:pointer}
    .sm-btn:active{background:var(--linen)}
    .sm-btn.del:active{border-color:#8B3A3A;color:#8B3A3A}

    /* DRAWER */
    .overlay{position:fixed;inset:0;background:rgba(44,44,44,.55);z-index:300;display:flex;align-items:flex-end;backdrop-filter:blur(2px)}
    .overlay.hidden{display:none}
    .drawer{width:100%;background:var(--white);border-radius:16px 16px 0 0;max-height:92vh;display:flex;flex-direction:column;animation:slideUp .25s cubic-bezier(.32,.72,0,1);padding-bottom:var(--safe-bottom)}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .drawer-handle{width:36px;height:4px;background:var(--stone);border-radius:2px;margin:12px auto 0}
    .drawer-header{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .drawer-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--text-dark)}
    .drawer-close{background:none;border:none;font-size:22px;color:var(--text-light);cursor:pointer;padding:0 4px}
    .drawer-body{padding:16px 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
    .drawer-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field{display:flex;flex-direction:column;gap:5px}
    .field.full{grid-column:1/-1}
    .field label{font-size:10px;color:var(--text-light);letter-spacing:.09em;text-transform:uppercase}
    .field input,.field select,.field textarea{padding:10px 12px;border:1px solid var(--border);background:var(--cream);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-dark);border-radius:6px;outline:none;-webkit-appearance:none}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--taupe);background:var(--white)}
    .field textarea{resize:none;min-height:64px}
    .drawer-footer{padding:12px 20px 8px;border-top:1px solid var(--border);display:flex;gap:10px}
    .btn-cancel{flex:1;padding:12px;background:none;border:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-med);border-radius:8px;cursor:pointer}
    .btn-save{flex:2;padding:12px;background:var(--charcoal);border:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--cream);letter-spacing:.05em;border-radius:8px;cursor:pointer}
    .btn-save:active{background:var(--warm-gray)}

    .toast{position:fixed;bottom:calc(var(--safe-bottom) + 24px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--charcoal);color:var(--cream);padding:9px 18px;border-radius:20px;font-size:12px;letter-spacing:.04em;opacity:0;transition:all .25s;z-index:500;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .hidden{display:none!important}
  </style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">Personal Care</div>
        <div class="header-title">Skincare Inventory</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn hidden" id="importBtn" title="Import">⬆</button>
        <button class="icon-btn hidden" id="exportBtn" title="Export">⬇</button>
        <button class="icon-btn add-icon" id="addBtn">+</button>
      </div>
    </div>
    <nav class="nav" id="navBar"></nav>
  </header>

  <div class="scroll-area" id="scrollArea">
    <div id="tab-inventory">
      <div class="stats-row" id="statsRow"></div>
      <div class="search-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="searchInput" placeholder="Search products or brands…" type="search"/>
      </div>
      <div class="cat-scroll" id="catScroll"></div>
      <div class="drag-hint">Hold & drag ≡ to reorder</div>
      <div class="draggable-list" id="productList"></div>
    </div>

    <div id="tab-shopping" class="hidden">
      <div class="page-header">
        <div><div class="page-eyebrow">Wishlist</div><div class="page-title">Shopping List</div></div>
      </div>
      <div class="shop-sections" id="shopSections"></div>
      <div class="shop-total"><span class="shop-total-lbl">Estimated Total</span><span class="shop-total-val" id="shopTotal">₹0</span></div>
    </div>

    <div id="tab-routine" class="hidden">
      <div class="page-header">
        <div><div class="page-eyebrow">Daily Protocol</div><div class="page-title">Skincare Routine</div></div>
      </div>
      <div class="drag-hint">Hold & drag ≡ to reorder</div>
      <div class="draggable-list" id="routineList"></div>
      <div class="page-header" style="padding-top:8px">
        <div><div class="page-eyebrow">Weekly Treatments</div></div>
        <button class="sm-btn" onclick="openAddWeekly()">+ Add</button>
      </div>
      <div class="drag-hint" style="padding-bottom:4px">Hold & drag ≡ to reorder</div>
      <div class="weekly-section" id="weeklyList"></div>
    </div>
  </div>

  <!-- PRODUCT DRAWER -->
  <div class="overlay hidden" id="productOverlay">
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header"><span class="drawer-title" id="productDrawerTitle">Add Product</span><button class="drawer-close" id="pClose">×</button></div>
      <div class="drawer-body">
        <div class="field full"><label>Product Name</label><input id="f-name" placeholder="e.g. Vitamin C Serum"/></div>
        <div class="drawer-row">
          <div class="field"><label>Brand</label><input id="f-brand" placeholder="e.g. Minimalist"/></div>
          <div class="field"><label>Category</label><select id="f-category"></select></div>
        </div>
        <div class="drawer-row">
          <div class="field"><label>Routine Step</label><input id="f-step" placeholder="e.g. Step 3 – AM"/></div>
          <div class="field"><label>Size (ml/g)</label><input id="f-size" type="number" placeholder="30"/></div>
        </div>
        <div class="drawer-row">
          <div class="field"><label>Purchase Date</label><input id="f-purchaseDate" type="date"/></div>
          <div class="field"><label>Expiry Date</label><input id="f-expiryDate" type="date"/></div>
        </div>
        <div class="drawer-row">
          <div class="field"><label>Quantity</label><input id="f-qty" type="number" min="0" value="1"/></div>
          <div class="field"><label>Price (₹)</label><input id="f-price" type="number" placeholder="499"/></div>
        </div>
        <div class="field full"><label>Notes</label><textarea id="f-notes" placeholder="Usage tips…"></textarea></div>
      </div>
      <div class="drawer-footer"><button class="btn-cancel" id="pCancel">Cancel</button><button class="btn-save" id="pSave">Save Product</button></div>
    </div>
  </div>

  <!-- SHOPPING DRAWER -->
  <div class="overlay hidden" id="shopOverlay">
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header"><span class="drawer-title" id="shopDrawerTitle">Add Item</span><button class="drawer-close" id="sClose">×</button></div>
      <div class="drawer-body">
        <div class="field full"><label>Product Name</label><input id="s-name" placeholder="e.g. Snail Mucin Essence"/></div>
        <div class="drawer-row">
          <div class="field"><label>Brand</label><input id="s-brand" placeholder="e.g. COSRX"/></div>
          <div class="field"><label>Category</label><select id="s-category"></select></div>
        </div>
        <div class="drawer-row">
          <div class="field"><label>Priority</label><select id="s-priority"><option>High</option><option>Medium</option><option>Low</option></select></div>
          <div class="field"><label>Price (₹)</label><input id="s-price" type="number" placeholder="999"/></div>
        </div>
        <div class="field full"><label>Where to Buy</label><input id="s-where" placeholder="e.g. Nykaa / Amazon"/></div>
        <div class="field full"><label>Notes</label><textarea id="s-notes" placeholder="Any details…"></textarea></div>
      </div>
      <div class="drawer-footer"><button class="btn-cancel" id="sCancel">Cancel</button><button class="btn-save" id="sSave">Save Item</button></div>
    </div>
  </div>

  <!-- ROUTINE DRAWER -->
  <div class="overlay hidden" id="routineOverlay">
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header"><span class="drawer-title" id="routineDrawerTitle">Add Step</span><button class="drawer-close" id="rClose">×</button></div>
      <div class="drawer-body">
        <div class="drawer-row">
          <div class="field"><label>Step No.</label><input id="r-step" placeholder="e.g. 07"/></div>
          <div class="field"><label>Step Name</label><input id="r-name" placeholder="e.g. Essence"/></div>
        </div>
        <div class="field full"><label>Morning (AM) Product</label><input id="r-am" placeholder="e.g. Rose Water Toner"/></div>
        <div class="field full"><label>Evening (PM) Product</label><input id="r-pm" placeholder="e.g. HA 2% + B5"/></div>
      </div>
      <div class="drawer-footer"><button class="btn-cancel" id="rCancel">Cancel</button><button class="btn-save" id="rSave">Save Step</button></div>
    </div>
  </div>

  <!-- WEEKLY DRAWER -->
  <div class="overlay hidden" id="weeklyOverlay">
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header"><span class="drawer-title" id="weeklyDrawerTitle">Add Treatment</span><button class="drawer-close" id="wClose">×</button></div>
      <div class="drawer-body">
        <div class="field full"><label>Frequency</label><input id="w-freq" placeholder="e.g. Weekly / Monthly"/></div>

const KEY="skincare_data_v3";
function persist(){try{localStorage.setItem(KEY,JSON.stringify({products,shopping,routine,weekly,tabOrder}));}catch(e){}}
function restore(){try{const d=localStorage.getItem(KEY);if(d)return JSON.parse(d);}catch(e){}return null;}

const stored=restore();
let products=stored?.products||JSON.parse(JSON.stringify(DEF_PRODUCTS));
let shopping=stored?.shopping||JSON.parse(JSON.stringify(DEF_SHOPPING));
let routine=stored?.routine||JSON.parse(JSON.stringify(DEF_ROUTINE));

const fmt=n=>"₹"+Number(n).toLocaleString("en-IN");
const daysLeft=d=>Math.floor((new Date(d)-new Date())/86400000);
const statusOf=(d,q)=>d<0?"expired":d<90?"expiring":q<=1?"low":"active";
function toast(msg){const t=el("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}
const el=id=>document.getElementById(id);
const hide=id=>el(id).classList.add("hidden");
const show=id=>el(id).classList.remove("hidden");

// ── DRAG & DROP ENGINE ────────────────────────
// Single global engine — one ghost, one set of listeners, no conflicts.

const DRAG={
  el:null, container:null, getData:null, setData:null, onDrop:null,
  startIdx:-1, dropIdx:-1, ghostOffsetY:0, scrollEl:null
};

// Create ghost element
function _createGhost(item, touchY){
  _removeGhost();
  const r=item.getBoundingClientRect();
  DRAG.ghostOffsetY=touchY-r.top;
  const g=item.cloneNode(true);
  g.id="_ghost";
  g.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;
    z-index:9999;pointer-events:none;opacity:0.93;
    box-shadow:0 8px 28px rgba(0,0,0,0.22);transform:scale(1.02);
    border-radius:6px;background:white;`;
  document.body.appendChild(g);
}
function _removeGhost(){
  const g=document.getElementById("_ghost");
  if(g) g.remove();
}
function _moveGhost(touchY){
  const g=document.getElementById("_ghost");
  if(g) g.style.top=(touchY-DRAG.ghostOffsetY)+"px";
}

// Drop indicator line
function _getLine(){
  let l=document.getElementById("_dropLine");
  if(!l){
    l=document.createElement("div");
    l.id="_dropLine";
    l.style.cssText="position:fixed;left:16px;right:16px;height:3px;background:#8C7B75;border-radius:2px;z-index:9998;pointer-events:none;display:none;";
    document.body.appendChild(l);
  }
  return l;
}
function _showLine(y){
  const l=_getLine();
  l.style.display="block";
  l.style.top=(y-1)+"px";
}
function _hideLine(){ _getLine().style.display="none"; }

// Figure out where finger is and return drop index
function _calcDrop(touchY){
  const items=Array.from(DRAG.container.querySelectorAll(":scope > .drag-item"));
  let idx=items.length;
  let lineY=null;
  for(let i=0;i<items.length;i++){
    if(items[i]===DRAG.el) continue;
    const r=items[i].getBoundingClientRect();
    if(touchY < r.top+r.height/2){
      idx=i; lineY=r.top; break;
    } else {
      lineY=r.bottom;
    }
  }
  if(lineY!==null) _showLine(Math.max(60,Math.min(window.innerHeight-10,lineY)));
  return idx;
}

function _endDrag(){
  if(!DRAG.el) return;
  // restore original item
  DRAG.el.style.opacity="";
  _removeGhost();
  _hideLine();

  // reorder
  const data=DRAG.getData();
  const moved=data.splice(DRAG.startIdx,1)[0];
  let fi=DRAG.dropIdx;
  if(fi>DRAG.startIdx) fi--;
  fi=Math.max(0,Math.min(fi,data.length));
  data.splice(fi,0,moved);
  DRAG.setData(data);

  const cb=DRAG.onDrop;
  // clear state first, then re-render
  DRAG.el=null; DRAG.container=null;
  cb();
}

// Global listeners (attached once)
document.addEventListener("touchmove", e=>{
  if(!DRAG.el) return;
  e.preventDefault();
  const y=e.touches[0].clientY;
  _moveGhost(y);
  DRAG.dropIdx=_calcDrop(y);
  if(DRAG.scrollEl){
    const sr=DRAG.scrollEl.getBoundingClientRect();
    if(y>sr.bottom-70) DRAG.scrollEl.scrollTop+=10;
    else if(y<sr.top+70) DRAG.scrollEl.scrollTop-=10;
  }
},{passive:false});

document.addEventListener("touchend", ()=>{ _endDrag(); });
document.addEventListener("touchcancel", ()=>{ _endDrag(); });

// Register a container for drag-to-reorder
function makeDraggable(container, getData, setData, onDrop){
  container.addEventListener("touchstart", e=>{
    const handle=e.target.closest(".drag-handle");
    if(!handle) return;
    const item=handle.closest(".drag-item");
    if(!item||!container.contains(item)) return;
    e.preventDefault();
    DRAG.el=item;
    DRAG.container=container;
    DRAG.getData=getData;
    DRAG.setData=setData;
    DRAG.onDrop=onDrop;
    DRAG.scrollEl=document.getElementById("scrollArea");
    DRAG.startIdx=Array.from(container.querySelectorAll(":scope > .drag-item")).indexOf(item);
    DRAG.dropIdx=DRAG.startIdx;
    item.style.opacity="0.25";
    _createGhost(item, e.touches[0].clientY);
  },{passive:false});
}

// Nav tab drag reorder
function initNavDrag(){
  const nav=el("navBar");
  let dragBtn=null, dragIdx=-1;

  nav.addEventListener("touchstart",e=>{
    dragBtn=e.target.closest(".nav-btn");
    if(!dragBtn) return;
    dragIdx=[...nav.children].indexOf(dragBtn);
    dragBtn.classList.add("dragging");
  },{passive:true});

  nav.addEventListener("touchmove",e=>{
    if(!dragBtn) return;
    const touch=e.touches[0];
    const btns=[...nav.querySelectorAll(".nav-btn")];
    btns.forEach(b=>b.classList.remove("drag-over"));
    for(const b of btns){
      if(b===dragBtn) continue;
      const r=b.getBoundingClientRect();
      if(touch.clientX>=r.left&&touch.clientX<=r.right){b.classList.add("drag-over");break;}
    }
  },{passive:true});

  nav.addEventListener("touchend",e=>{
    if(!dragBtn) return;
    dragBtn.classList.remove("dragging");
    const touch=e.changedTouches[0];
    const btns=[...nav.querySelectorAll(".nav-btn")];
    btns.forEach(b=>b.classList.remove("drag-over"));
    let targetIdx=-1;
    for(let i=0;i<btns.length;i++){
      const r=btns[i].getBoundingClientRect();
      if(touch.clientX>=r.left&&touch.clientX<=r.right&&btns[i]!==dragBtn){targetIdx=i;break;}
    }
    if(targetIdx>=0&&targetIdx!==dragIdx){
      tabOrder.splice(dragIdx,1);
      tabOrder.splice(targetIdx,0,tabOrder.splice(dragIdx,0,tabOrder[dragIdx])[0]);
      // rebuild from scratch cleanly
      const moved=tabOrder.splice(dragIdx,1)[0]; // already removed above, redo properly
      tabOrder=[...DEF_TABS]; // reset then reorder
      // simpler: just swap
      const t=[...tabOrder]; // current
      const a=t[dragIdx],b2=t[targetIdx];
      t[dragIdx]=b2; t[targetIdx]=a;
      tabOrder=t;
      persist(); renderNav();
    }
    dragBtn=null;
  });
}

// ── RENDER NAV ────────────────────────────────
function renderNav(){
  const labels={inventory:"Inventory",shopping:"Shopping",routine:"Routine"};
  el("navBar").innerHTML=tabOrder.map(t=>

  ).join("");

}

// ── RENDER SHOPPING (category-grouped) ───────
const PRI_STRIPE={High:"#C97878",Medium:"#C9A96E",Low:"#8FAF90"};
// track which sections are collapsed
const collapsedSections=new Set();

function renderShopping(){
  const wrap=el("shopSections");
  if(!shopping.length){
    wrap.innerHTML=`<div class="empty">No items — tap + to add</div>`;
    el("shopTotal").textContent=fmt(0); return;
  }

  // Group by category, preserving intra-category order from shopping array
  const catMap=new Map();
  shopping.forEach(item=>{
    const c=item.category||"Other";
    if(!catMap.has(c)) catMap.set(c,[]);
    catMap.get(c).push(item);
  });

  // Render each category section
  wrap.innerHTML="";
  catMap.forEach((items, cat)=>{
    const isCollapsed=collapsedSections.has(cat);
    const subtotal=items.reduce((s,i)=>s+i.price,0);

    const section=document.createElement("div");
    section.className="shop-section"+(isCollapsed?" collapsed":"");
    section.dataset.cat=cat;

    section.innerHTML=`
      <div class="shop-section-header" onclick="toggleSection('${cat}')">
        <div class="shop-section-left">
          <span class="shop-section-name">${cat}</span>
          <span class="shop-section-count">${items.length}</span>
        </div>
        <div class="shop-section-right">
          <span class="shop-section-subtotal">${fmt(subtotal)}</span>
          <span class="shop-chevron">▾</span>
        </div>
      </div>
      <div class="shop-section-body" id="sec-${cat.replace(/\s/g,'_')}">
        <div class="section-drag-hint">Hold ≡ to reorder</div>
        ${items.map(item=>{
          const pc=PRI[item.priority]||PRI.Medium;
          const stripe=PRI_STRIPE[item.priority]||PRI_STRIPE.Medium;
          return `<div class="drag-item shop-card" data-id="${item.id}">
            <div class="pri-stripe" style="background:${stripe}"></div>
            <div class="drag-handle" style="opacity:.25"><span></span><span></span><span></span></div>
            <div class="shop-card-inner">
              <div class="shop-card-top">
                <div><div class="shop-name">${item.name}</div><div class="shop-brand">${item.brand}</div></div>
                <div class="shop-price">${fmt(item.price)}</div>
              </div>
              <div class="shop-meta">
                <span class="badge" style="color:${pc.color};background:${pc.bg};font-size:10px;padding:2px 8px">${item.priority}</span>
                ${item.where?`<span class="shop-where">${item.where}</span>`:""}
              </div>
              ${item.notes?`<div class="shop-note">${item.notes}</div>`:""}
              <div class="shop-bottom">
                <button class="action-btn" onclick="openEditS(${item.id})">Edit</button>
                <button class="action-btn del" onclick="delShop(${item.id})">Remove</button>
              </div>
            </div>
          </div>`;
        }).join("")}
      </div>`;

    wrap.appendChild(section);

    // Enable drag-to-reorder within this category section
    const body=section.querySelector(".shop-section-body");
    makeDraggable(
      body,
      ()=>shopping.filter(i=>(i.category||"Other")===cat),
      (reordered)=>{
        // splice reordered items back into shopping preserving other cats
        const others=shopping.filter(i=>(i.category||"Other")!==cat);
        // find insertion index: position of first item of this cat in shopping
        let insertAt=shopping.findIndex(i=>(i.category||"Other")===cat);
        if(insertAt===-1) insertAt=shopping.length;
        shopping=[...others.slice(0,insertAt),...reordered,...others.slice(insertAt)];
        // simpler: just replace all items of this cat in original order positions
        shopping=rebuildShopping(cat, reordered);
      },
      ()=>{persist();renderShopping();}
    );
  });

  el("shopTotal").textContent=fmt(shopping.reduce((s,i)=>s+i.price,0));
}

function rebuildShopping(cat, reordered){
  // Replace items of `cat` in shopping with reordered, keeping positions of other cats intact
  const result=[];
  let ri=0;
  const catItems=reordered;
  let catIdx=0;
  shopping.forEach(item=>{
    if((item.category||"Other")===cat){
      if(catIdx<catItems.length) result.push(catItems[catIdx++]);
    } else {
      result.push(item);
    }
  });
  return result;
}

function toggleSection(cat){
  if(collapsedSections.has(cat)) collapsedSections.delete(cat);
  else collapsedSections.add(cat);
  renderShopping();
}

function switchTab(t){

  el("exportBtn").classList.toggle("hidden",t!=="inventory");

  el("scrollArea").scrollTop=0;
  renderNav();
  if(t==="shopping") renderShopping();
  if(t==="routine") renderRoutine();
}

// ── PRODUCT CRUD ──────────────────────────────
function openAddP(){epId=null;el("productDrawerTitle").textContent="Add Product";["name","brand","step","notes","size","purchaseDate","expiryDate","price"].forEach(f=>el("f-"+f).value="");el("f-category").value="Serum";el("f-qty").value=1;show("productOverlay");}
function openEditP(id){epId=id;const p=products.find(x=>x.id===id);el("productDrawerTitle").textContent="Edit Product";["name","brand","step","notes","size","purchaseDate","expiryDate","qty","price"].forEach(f=>el("f-"+f).value=p[f]||"");el("f-category").value=p.category;show("productOverlay");}
function saveP(){
  const name=el("f-name").value.trim(),brand=el("f-brand").value.trim(),exp=el("f-expiryDate").value;
  if(!name||!brand||!exp){toast("Name, brand & expiry required");return;}
  const p={id:epId||Date.now(),name,brand,category:el("f-category").value,step:el("f-step").value,size:Number(el("f-size").value)||0,purchaseDate:el("f-purchaseDate").value,expiryDate:exp,qty:Number(el("f-qty").value)||1,price:Number(el("f-price").value)||0,notes:el("f-notes").value};
  if(epId) products=products.map(x=>x.id===epId?p:x); else products.push(p);
  hide("productOverlay");persist();renderStats();renderProducts();toast("Saved ✓");
}
function delProduct(id){if(!confirm("Remove this product?"))return;products=products.filter(x=>x.id!==id);persist();renderStats();renderProducts();toast("Removed");}

// ── SHOPPING CRUD ─────────────────────────────
function openAddS(){esId=null;el("shopDrawerTitle").textContent="Add Item";["name","brand","where","notes","price"].forEach(f=>el("s-"+f).value="");el("s-category").value="Serum";el("s-priority").value="Medium";show("shopOverlay");}
function openEditS(id){esId=id;const i=shopping.find(x=>x.id===id);el("shopDrawerTitle").textContent="Edit Item";["name","brand","where","notes","price"].forEach(f=>el("s-"+f).value=i[f]||"");el("s-category").value=i.category;el("s-priority").value=i.priority;show("shopOverlay");}
function saveS(){
  const name=el("s-name").value.trim();if(!name){toast("Name required");return;}
  const item={id:esId||Date.now(),name,brand:el("s-brand").value,category:el("s-category").value,priority:el("s-priority").value,price:Number(el("s-price").value)||0,where:el("s-where").value,notes:el("s-notes").value};
  if(esId) shopping=shopping.map(x=>x.id===esId?item:x); else shopping.push(item);
  hide("shopOverlay");persist();renderShopping();toast("Saved ✓");
}
function delShop(id){if(!confirm("Remove this item?"))return;shopping=shopping.filter(x=>x.id!==id);persist();renderShopping();toast("Removed");}

// ── ROUTINE CRUD ──────────────────────────────
function openAddR(){erId=null;el("routineDrawerTitle").textContent="Add Step";["step","name","am","pm"].forEach(f=>el("r-"+f).value="");show("routineOverlay");}
function openEditR(id){erId=id;const r=routine.find(x=>x.id===id);el("routineDrawerTitle").textContent="Edit Step";["step","name","am","pm"].forEach(f=>el("r-"+f).value=r[f]||"");show("routineOverlay");}
function saveR(){
  const name=el("r-name").value.trim();if(!name){toast("Step name required");return;}
  const r={id:erId||Date.now(),step:el("r-step").value,name,am:el("r-am").value,pm:el("r-pm").value};
  if(erId) routine=routine.map(x=>x.id===erId?r:x); else routine.push(r);
  hide("routineOverlay");persist();renderRoutine();toast("Saved ✓");
}
function delRoutine(id){if(!confirm("Remove this step?"))return;routine=routine.filter(x=>x.id!==id);persist();renderRoutine();toast("Removed");}

// ── WEEKLY CRUD ───────────────────────────────
function openAddWeekly(){ewId=null;el("weeklyDrawerTitle").textContent="Add Treatment";["freq","name","note"].forEach(f=>el("w-"+f).value="");show("weeklyOverlay");}
function openEditW(id){ewId=id;const w=weekly.find(x=>x.id===id);el("weeklyDrawerTitle").textContent="Edit Treatment";["freq","name","note"].forEach(f=>el("w-"+f).value=w[f]||"");show("weeklyOverlay");}
function saveW(){
  const name=el("w-name").value.trim();if(!name){toast("Name required");return;}
  const w={id:ewId||Date.now(),freq:el("w-freq").value,name,note:el("w-note").value};
  if(ewId) weekly=weekly.map(x=>x.id===ewId?w:x); else weekly.push(w);
  hide("weeklyOverlay");persist();renderRoutine();toast("Saved ✓");
}
function delWeekly(id){if(!confirm("Remove?"))return;weekly=weekly.filter(x=>x.id!==id);persist();renderRoutine();toast("Removed");}

// ── EXPORT / IMPORT ───────────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify({products,shopping,routine,weekly,tabOrder},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download=`skincare-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);toast("Exported ✓");
}
function importData(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.products) throw 0;
      products=d.products;shopping=d.shopping||[];routine=d.routine||[];weekly=d.weekly||[];tabOrder=d.tabOrder||[...DEF_TABS];
      persist();renderNav();renderStats();renderProducts();renderCats();toast("Imported ✓");
    }catch{toast("Invalid file");}
  };
  reader.readAsText(file);
}

// ── INIT ──────────────────────────────────────
el("f-category").innerHTML=CAT_OPTS.map(c=>`<option>${c}</option>`).join("");
el("s-category").innerHTML=CAT_OPTS.map(c=>`<option>${c}</option>`).join("");

el("addBtn").addEventListener("click",()=>{
  if(currentTab==="inventory") openAddP();
  else if(currentTab==="shopping") openAddS();
  else if(currentTab==="routine") openAddR();
});
el("exportBtn").addEventListener("click",exportData);
el("importBtn").addEventListener("click",()=>el("importFile").click());
el("importFile").addEventListener("change",e=>{if(e.target.files[0]){importData(e.target.files[0]);e.target.value="";}});

[["productOverlay","pClose","pCancel","pSave",saveP],
 ["shopOverlay","sClose","sCancel","sSave",saveS],
 ["routineOverlay","rClose","rCancel","rSave",saveR],
 ["weeklyOverlay","wClose","wCancel","wSave",saveW]
].forEach(([ov,cl,cn,sv,fn])=>{
  el(cl).onclick=el(cn).onclick=()=>hide(ov);
  el(sv).onclick=fn;
  el(ov).addEventListener("click",e=>{if(e.target===e.currentTarget)hide(ov);});
});

el("searchInput").addEventListener("input",e=>{searchVal=e.target.value;renderProducts();});
el("catScroll").addEventListener("click",e=>{if(e.target.dataset.cat){catFilter=e.target.dataset.cat;renderCats();renderProducts();}});

show("exportBtn");show("importBtn");
renderNav();renderStats();renderProducts();renderCats();
</script>
