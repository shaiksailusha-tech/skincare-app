<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Skincare" />
  <meta name="theme-color" content="#3C3C3C" />
  <title>Skincare Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --charcoal: #3C3C3C; --warm-gray: #6B6560; --taupe: #8C7B75;
      --stone: #E8E4E0; --linen: #F2EDE8; --cream: #FAF8F5;
      --white: #FFFFFF; --text-dark: #2C2C2C; --text-med: #5A5550;
      --text-light: #8C8580; --border: #DDD8D2;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--text-dark); overflow: hidden; }
    #app { height: 100%; display: flex; flex-direction: column; }

    /* HEADER */
    .header {
      background: var(--charcoal); flex-shrink: 0;
      padding: calc(var(--safe-top) + 16px) 20px 16px;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .header-eyebrow { font-size: 10px; color: var(--taupe); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 3px; }
    .header-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: var(--cream); letter-spacing: 0.03em; }
    .add-fab {
      width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2); color: var(--cream);
      font-size: 22px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.2s;
    }
    .add-fab:active { background: rgba(255,255,255,0.22); }

    /* NAV TABS */
    .nav { display: flex; gap: 2px; }
    .nav-btn {
      flex: 1; background: none; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400;
      color: rgba(250,248,245,0.4); letter-spacing: 0.08em; text-transform: uppercase;
      padding: 9px 4px; border-radius: 3px; transition: all 0.2s;
    }
    .nav-btn.active { color: var(--cream); background: rgba(255,255,255,0.12); }

    /* SCROLL AREA */
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bottom) + 24px); }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .stat { background: var(--white); padding: 14px 16px; }
    .stat-dot { width: 5px; height: 5px; border-radius: 50%; margin-bottom: 6px; }
    .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: var(--charcoal); line-height: 1; }
    .stat-lbl { font-size: 9px; color: var(--text-light); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }

    /* SEARCH */
    .search-bar { padding: 12px 16px; background: var(--linen); border-bottom: 1px solid var(--border); position: relative; }
    .search-bar svg { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); color: var(--text-light); pointer-events: none; }
    .search-input {
      width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--border);
      background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--text-dark); border-radius: 6px; outline: none;
      -webkit-appearance: none;
    }
    .search-input:focus { border-color: var(--taupe); }

    /* CAT PILLS */
    .cat-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px; background: var(--linen); border-bottom: 1px solid var(--border); scrollbar-width: none; }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0; padding: 6px 12px; border: 1px solid var(--border); background: var(--white);
      font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--text-med);
      border-radius: 20px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .pill.active { background: var(--charcoal); border-color: var(--charcoal); color: var(--cream); }

    /* PRODUCT CARDS */
    .product-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .product-card {
      background: var(--white); border: 1px solid var(--border); border-radius: 6px;
      padding: 14px 16px; transition: box-shadow 0.2s;
    }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .card-name { font-size: 14px; font-weight: 500; color: var(--text-dark); line-height: 1.3; flex: 1; margin-right: 10px; }
    .card-brand { font-size: 11px; color: var(--text-light); margin-top: 2px; }
    .card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .meta-chip { font-size: 11px; color: var(--text-med); background: var(--linen); padding: 3px 8px; border-radius: 4px; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--stone); }
    .card-price { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: var(--charcoal); }
    .card-actions { display: flex; gap: 6px; }
    .action-btn {
      padding: 5px 12px; border: 1px solid var(--border); background: none;
      font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--text-med);
      border-radius: 4px; cursor: pointer; transition: all 0.15s;
    }
    .action-btn:active { background: var(--linen); }
    .action-btn.del:active { border-color: #8B3A3A; color: #8B3A3A; }
    .days-tag { font-size: 12px; font-weight: 500; }
    .days-ok { color: var(--text-med); }
    .days-warn { color: #8B6914; }
    .days-exp { color: #8B3A3A; }
    .empty { padding: 60px 20px; text-align: center; color: var(--text-light); font-size: 14px; }

    /* SHOPPING */
    .page-header { padding: 20px 16px 4px; }
    .page-eyebrow { font-size: 10px; color: var(--text-light); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--charcoal); }
    .shop-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .shop-card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
    .shop-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .shop-name { font-size: 14px; font-weight: 500; color: var(--text-dark); line-height: 1.3; }
    .shop-brand { font-size: 11px; color: var(--text-light); margin-top: 2px; }
    .shop-price { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--charcoal); flex-shrink: 0; margin-left: 10px; }
    .shop-meta { display: flex; gap: 8px; align-items: center; }
    .shop-where { font-size: 11px; color: var(--text-med); }
    .shop-note { font-size: 11px; color: var(--text-light); font-style: italic; margin-top: 6px; }
    .shop-total { margin: 4px 16px 0; background: var(--linen); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .shop-total-lbl { font-size: 11px; color: var(--text-med); letter-spacing: 0.06em; text-transform: uppercase; }
    .shop-total-val { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; color: var(--charcoal); }

    /* ROUTINE */
    .routine-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .routine-card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .routine-card-header { background: var(--linen); padding: 8px 14px; display: flex; align-items: center; gap: 10px; }
    .routine-step-num { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--stone); min-width: 28px; }
    .routine-step-name { font-size: 11px; font-weight: 500; color: var(--text-med); letter-spacing: 0.08em; text-transform: uppercase; }
    .routine-slots { display: grid; grid-template-columns: 1fr 1fr; }
    .routine-slot { padding: 10px 14px; border-top: 1px solid var(--stone); }
    .routine-slot:first-child { border-right: 1px solid var(--stone); }
    .routine-slot-lbl { font-size: 9px; color: var(--text-light); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
    .routine-slot-val { font-size: 12px; color: var(--text-dark); line-height: 1.4; }
    .weekly-section { padding: 0 16px 8px; }
    .weekly-card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; }
    .weekly-freq { font-size: 10px; color: var(--text-light); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
    .weekly-name { font-size: 13px; font-weight: 500; color: var(--text-dark); margin-bottom: 3px; }
    .weekly-note { font-size: 11px; color: var(--text-light); font-style: italic; }

    /* MODAL / DRAWER */
    .overlay {
      position: fixed; inset: 0; background: rgba(44,44,44,0.55);
      z-index: 300; display: flex; align-items: flex-end;
      backdrop-filter: blur(2px); animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    .drawer {
      width: 100%; background: var(--white); border-radius: 16px 16px 0 0;
      max-height: 92vh; display: flex; flex-direction: column;
      animation: slideUp 0.25s cubic-bezier(0.32,0.72,0,1);
      padding-bottom: var(--safe-bottom);
    }
    @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
    .drawer-handle { width: 36px; height: 4px; background: var(--stone); border-radius: 2px; margin: 12px auto 0; }
    .drawer-header { padding: 16px 20px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .drawer-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--text-dark); }
    .drawer-close { background: none; border: none; font-size: 22px; color: var(--text-light); cursor: pointer; padding: 0 4px; }
    .drawer-body { padding: 16px 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 14px; }
    .drawer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.full { grid-column: 1 / -1; }
    .field label { font-size: 10px; color: var(--text-light); letter-spacing: 0.09em; text-transform: uppercase; }
    .field input, .field select, .field textarea {
      padding: 10px 12px; border: 1px solid var(--border); background: var(--cream);
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-dark);
      border-radius: 6px; outline: none; -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--taupe); background: var(--white); }
    .field textarea { resize: none; min-height: 70px; }
    .drawer-footer { padding: 12px 20px 8px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    .btn-cancel { flex: 1; padding: 12px; background: none; border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-med); border-radius: 8px; cursor: pointer; }
    .btn-save { flex: 2; padding: 12px; background: var(--charcoal); border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--cream); letter-spacing: 0.05em; border-radius: 8px; cursor: pointer; }
    .btn-save:active { background: var(--warm-gray); }

    /* HIDDEN */
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">Personal Care</div>
        <div class="header-title">Skincare Inventory</div>
      </div>
      <button class="add-fab" id="addBtn" style="display:none">+</button>
    </div>
    <nav class="nav">
      <button class="nav-btn active" data-tab="inventory">Inventory</button>
      <button class="nav-btn" data-tab="shopping">Shopping</button>
      <button class="nav-btn" data-tab="routine">Routine</button>
    </nav>
  </header>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scrollArea">

    <!-- INVENTORY TAB -->
    <div id="tab-inventory">
      <div class="stats-row" id="statsRow"></div>
      <div class="search-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="searchInput" placeholder="Search products or brands…" type="search" />
      </div>
      <div class="cat-scroll" id="catScroll"></div>
      <div class="product-list" id="productList"></div>
    </div>

    <!-- SHOPPING TAB -->
    <div id="tab-shopping" class="hidden">
      <div class="page-header">
        <div class="page-eyebrow">Wishlist</div>
        <div class="page-title">Shopping List</div>
      </div>
      <div class="shop-list" id="shopList"></div>
      <div class="shop-total">
        <span class="shop-total-lbl">Estimated Total</span>
        <span class="shop-total-val" id="shopTotal"></span>
      </div>
    </div>

    <!-- ROUTINE TAB -->
    <div id="tab-routine" class="hidden">
      <div class="page-header">
        <div class="page-eyebrow">Daily Protocol</div>
        <div class="page-title">Skincare Routine</div>
      </div>
      <div class="routine-list" id="routineList"></div>
      <div class="page-header" style="padding-top:8px">
        <div class="page-eyebrow">Weekly</div>
      </div>
      <div class="weekly-section" id="weeklyList"></div>
    </div>

  </div>

  <!-- DRAWER MODAL -->
  <div class="overlay hidden" id="overlay">
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header">
        <span class="drawer-title" id="drawerTitle">Add Product</span>
        <button class="drawer-close" id="drawerClose">×</button>
      </div>
      <div class="drawer-body">
        <div class="field full">
          <label>Product Name</label>
          <input id="f-name" placeholder="e.g. Vitamin C Serum" />
        </div>
        <div class="drawer-row">
          <div class="field">
            <label>Brand</label>
            <input id="f-brand" placeholder="e.g. Minimalist" />
          </div>
          <div class="field">
            <label>Category</label>
            <select id="f-category"></select>
          </div>
        </div>
        <div class="drawer-row">
          <div class="field">
            <label>Routine Step</label>
            <input id="f-step" placeholder="e.g. Step 3 – AM" />
          </div>
          <div class="field">
            <label>Size (ml/g)</label>
            <input id="f-size" type="number" placeholder="30" />
          </div>
        </div>
        <div class="drawer-row">
          <div class="field">
            <label>Purchase Date</label>
            <input id="f-purchaseDate" type="date" />
          </div>
          <div class="field">
            <label>Expiry Date</label>
            <input id="f-expiryDate" type="date" />
          </div>
        </div>
        <div class="drawer-row">
          <div class="field">
            <label>Quantity</label>
            <input id="f-qty" type="number" min="0" value="1" />
          </div>
          <div class="field">
            <label>Price (₹)</label>
            <input id="f-price" type="number" placeholder="499" />
          </div>
        </div>
        <div class="field full">
          <label>Notes</label>
          <textarea id="f-notes" placeholder="Usage tips, skin type notes…"></textarea>
        </div>
      </div>
      <div class="drawer-footer">
        <button class="btn-cancel" id="drawerCancel">Cancel</button>
        <button class="btn-save" id="drawerSave">Save Product</button>
      </div>
    </div>
  </div>
</div>

  { step:"02", name:"Toner", am:"Rose Water Toner", pm:"HA 2% + B5 on damp skin" },

  { step:"06", name:"Sunscreen", am:"Re'equil SPF 50+ PA++++", pm:"—" },
];

const WEEKLY = [
  { freq:"Weekly", name:"AHA/BHA Exfoliant", note:"The Ordinary Peeling Solution – max 10 min, PM only" },
  { freq:"Monthly", name:"Face Mask", note:"Clay mask or hydrating sheet mask" },
];

const fmt = n => "₹" + Number(n).toLocaleString("en-IN");

function getDaysLeft(d) {
  return Math.floor((new Date(d) - new Date()) / 86400000);
}
function getStatus(days, qty) {
  if (days < 0) return "expired";
  if (days < 90) return "expiring";
  if (qty <= 1) return "low";
  return "active";
}

// ── LOCAL STORAGE ─────────────────────────────
const STORAGE_KEY = "skincare_products_v1";

function saveToStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); } catch(e) {}
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}

let currentTab = "inventory";
let searchVal = "";
let catFilter = "All";
let editId = null;

// ── RENDER STATS ──────────────────────────────
function renderStats() {
  const statuses = products.map(p => getStatus(getDaysLeft(p.expiryDate), p.qty));
  const totalVal = products.reduce((s,p) => s + p.qty * p.price, 0);
  const rows = [
    { label:"Products", val: products.length, dot:"#3C3C3C" },
    { label:"Value", val: fmt(totalVal), dot:"#6B7D6E" },
    { label:"Expiring", val: statuses.filter(s=>s==="expiring").length, dot:"#8B6914" },
  ];
  document.getElementById("statsRow").innerHTML = rows.map(r =>
    `<div class="stat">
      <div class="stat-dot" style="background:${r.dot}"></div>
      <div class="stat-val">${r.val}</div>
      <div class="stat-lbl">${r.label}</div>
    </div>`
  ).join("");
}

// ── RENDER CATS ───────────────────────────────
function renderCats() {
  document.getElementById("catScroll").innerHTML = CATEGORIES.map(c =>
    `<button class="pill ${catFilter===c?"active":""}" data-cat="${c}">${c}</button>`
  ).join("");
}

// ── RENDER PRODUCTS ───────────────────────────
function renderProducts() {
  const filtered = products.filter(p => {
    const s = searchVal.toLowerCase();
    return (p.name.toLowerCase().includes(s) || p.brand.toLowerCase().includes(s))
      && (catFilter === "All" || p.category === catFilter);
  });
  if (!filtered.length) {
    document.getElementById("productList").innerHTML = `<div class="empty">No products found</div>`;
    return;
  }
  document.getElementById("productList").innerHTML = filtered.map(p => {
    const days = getDaysLeft(p.expiryDate);
    const st = getStatus(days, p.qty);
    const sc = STATUS_CONFIG[st];
    const daysClass = days < 0 ? "days-exp" : days < 90 ? "days-warn" : "days-ok";
    const daysLabel = days < 0 ? `${Math.abs(days)}d ago` : `${days}d left`;
    return `<div class="product-card">
      <div class="card-top">
        <div>
          <div class="card-name">${p.name}</div>
          <div class="card-brand">${p.brand}</div>
        </div>
        <span class="badge" style="color:${sc.color};background:${sc.bg};flex-shrink:0">${sc.label}</span>
      </div>
      <div class="card-meta">
        <span class="meta-chip">${p.category}</span>
        <span class="meta-chip">${p.step}</span>
        <span class="meta-chip">${p.size}ml</span>
        <span class="days-tag ${daysClass}">${daysLabel}</span>
      </div>
      <div class="card-bottom">
        <div class="card-price">${fmt(p.qty * p.price)} <span style="font-size:12px;color:var(--text-light);font-family:'DM Sans',sans-serif">×${p.qty}</span></div>
        <div class="card-actions">
          <button class="action-btn" onclick="openEdit(${p.id})">Edit</button>
          <button class="action-btn del" onclick="deleteProduct(${p.id})">Remove</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── RENDER SHOPPING ───────────────────────────
function renderShopping() {
  document.getElementById("shopList").innerHTML = SHOPPING.map(item => {
    const pc = PRIORITY_CONFIG[item.priority];
    return `<div class="shop-card">
      <div class="shop-card-top">
        <div>
          <div class="shop-name">${item.name}</div>
          <div class="shop-brand">${item.brand} · ${item.category}</div>
        </div>
        <div class="shop-price">${fmt(item.price)}</div>
      </div>
      <div class="shop-meta">
        <span class="badge" style="color:${pc.color};background:${pc.bg}">${item.priority}</span>
        <span class="shop-where">${item.where}</span>
      </div>
      <div class="shop-note">${item.notes}</div>
    </div>`;
  }).join("");
  document.getElementById("shopTotal").textContent = fmt(SHOPPING.reduce((s,i)=>s+i.price,0));
}

// ── RENDER ROUTINE ────────────────────────────
function renderRoutine() {
  document.getElementById("routineList").innerHTML = ROUTINE.map(r =>
    `<div class="routine-card">
      <div class="routine-card-header">
        <div class="routine-step-num">${r.step}</div>
        <div class="routine-step-name">${r.name}</div>
      </div>
      <div class="routine-slots">
        <div class="routine-slot">
          <div class="routine-slot-lbl">Morning</div>
          <div class="routine-slot-val">${r.am}</div>
        </div>
        <div class="routine-slot">
          <div class="routine-slot-lbl">Evening</div>
          <div class="routine-slot-val">${r.pm}</div>
        </div>
      </div>
    </div>`
  ).join("");
  document.getElementById("weeklyList").innerHTML = WEEKLY.map(w =>
    `<div class="weekly-card">
      <div class="weekly-freq">${w.freq}</div>
      <div class="weekly-name">${w.name}</div>
      <div class="weekly-note">${w.note}</div>
    </div>`
  ).join("");
}

// ── TABS ──────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ["inventory","shopping","routine"].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle("hidden", t !== tab);
  });
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("addBtn").style.display = tab === "inventory" ? "flex" : "none";
  document.getElementById("scrollArea").scrollTop = 0;
  if (tab === "shopping") renderShopping();
  if (tab === "routine") renderRoutine();
}

// ── MODAL ─────────────────────────────────────
function openAdd() {
  editId = null;
  document.getElementById("drawerTitle").textContent = "Add Product";
  ["name","brand","step","notes"].forEach(f => document.getElementById("f-"+f).value = "");
  document.getElementById("f-category").value = "Serum";
  document.getElementById("f-size").value = "";
  document.getElementById("f-purchaseDate").value = "";
  document.getElementById("f-expiryDate").value = "";
  document.getElementById("f-qty").value = 1;
  document.getElementById("f-price").value = "";
  showDrawer();
}
function openEdit(id) {
  editId = id;
  const p = products.find(x => x.id === id);
  document.getElementById("drawerTitle").textContent = "Edit Product";
  document.getElementById("f-name").value = p.name;
  document.getElementById("f-brand").value = p.brand;
  document.getElementById("f-category").value = p.category;
  document.getElementById("f-step").value = p.step;
  document.getElementById("f-size").value = p.size;
  document.getElementById("f-purchaseDate").value = p.purchaseDate;
  document.getElementById("f-expiryDate").value = p.expiryDate;
  document.getElementById("f-qty").value = p.qty;
  document.getElementById("f-price").value = p.price;
  document.getElementById("f-notes").value = p.notes;
  showDrawer();
}
function showDrawer() { document.getElementById("overlay").classList.remove("hidden"); }
function hideDrawer() { document.getElementById("overlay").classList.add("hidden"); }

function saveProduct() {
  const name = document.getElementById("f-name").value.trim();
  const brand = document.getElementById("f-brand").value.trim();
  const expiryDate = document.getElementById("f-expiryDate").value;
  if (!name || !brand || !expiryDate) { alert("Name, brand and expiry date are required."); return; }
  const product = {
    id: editId || Date.now(),
    name, brand,
    category: document.getElementById("f-category").value,
    step: document.getElementById("f-step").value,
    size: Number(document.getElementById("f-size").value) || 0,
    purchaseDate: document.getElementById("f-purchaseDate").value,
    expiryDate,
    qty: Number(document.getElementById("f-qty").value) || 1,
    price: Number(document.getElementById("f-price").value) || 0,
    notes: document.getElementById("f-notes").value,
  };
  if (editId) {
    products = products.map(p => p.id === editId ? product : p);
  } else {
    products.push(product);
  }
  hideDrawer();
  saveToStorage();
  renderAll();
}

function deleteProduct(id) {
  if (!confirm("Remove this product?")) return;
  products = products.filter(p => p.id !== id);
  saveToStorage();
  renderAll();
}

function renderAll() {
  renderStats();
  renderProducts();
}

// ── INIT ──────────────────────────────────────
// Load saved products or use defaults
const saved = loadFromStorage();
if (saved) products = saved;

// Populate category select
document.getElementById("f-category").innerHTML = CATEGORIES.slice(1).map(c => `<option>${c}</option>`).join("");

// Event listeners
document.querySelectorAll(".nav-btn").forEach(b => b.addEventListener("click", () => switchTab(b.dataset.tab)));
document.getElementById("addBtn").addEventListener("click", openAdd);
document.getElementById("drawerClose").addEventListener("click", hideDrawer);
document.getElementById("drawerCancel").addEventListener("click", hideDrawer);
document.getElementById("drawerSave").addEventListener("click", saveProduct);
document.getElementById("overlay").addEventListener("click", e => { if (e.target === e.currentTarget) hideDrawer(); });

document.getElementById("searchInput").addEventListener("input", e => {
  searchVal = e.target.value;
  renderProducts();
});

document.getElementById("catScroll").addEventListener("click", e => {
  if (e.target.dataset.cat) {
    catFilter = e.target.dataset.cat;
    renderCats();
    renderProducts();
  }
});

// Initial render
document.getElementById("addBtn").style.display = "flex";
renderAll();
renderCats();
</script>
</body>
</html>
